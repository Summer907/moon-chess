services:
  - type: web
    name: moon-chess
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build &&
      cd .. && uv sync --locked --no-dev
    startCommand: uv run --no-sync uvicorn --app-dir backend app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
